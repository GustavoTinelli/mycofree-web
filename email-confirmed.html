<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCofree — Email confirmado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #313244;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; color: #89b4fa; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: #bac2de; }
    .note { margin-top: 24px; font-size: 13px; color: #6c7086; }
    .brand { margin-top: 32px; font-size: 13px; color: #a6adc8; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Email confirmado!</h1>
    <p>A sua conta MyCofree foi verificada com sucesso.</p>
    <p class="note">Pode fechar esta janela e iniciar sessão na aplicação.</p>
    <div class="brand">MyCofree · Controle financeiro pessoal</div>
  </div>
</body>
</html>
