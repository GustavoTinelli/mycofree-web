<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCofree</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #313244;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 26px; font-weight: 700; color: #89b4fa; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: #bac2de; }
    .brand { margin-top: 32px; font-size: 13px; color: #45475a; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MyCofree</h1>
    <p>Controlo financeiro pessoal</p>
    <div class="brand">mycofree-web</div>
  </div>
</body>
</html>
