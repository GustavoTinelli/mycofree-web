<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCofree — Redefinir senha</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #313244;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; color: #89b4fa; margin-bottom: 12px; }
    p { font-size: 14px; line-height: 1.6; color: #bac2de; }
    .form { margin-top: 24px; text-align: left; }
    label { display: block; font-size: 13px; color: #a6adc8; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 8px;
      color: #cdd6f4;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #89b4fa; }
    button {
      width: 100%;
      padding: 12px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #f38ba8; font-size: 13px; margin-top: -8px; margin-bottom: 12px; }
    .brand { margin-top: 32px; font-size: 13px; color: #a6adc8; letter-spacing: 0.5px; }
    #loading { color: #6c7086; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">🔒</div>
    <h1>Redefinir senha</h1>
    <p id="loading">A verificar o link…</p>
    <div class="brand">MyCofree · Controle financeiro pessoal</div>
  </div>

  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://tnzvckjttycsbfvlgngq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuenZja2p0dHljc2JmdmxnbmdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTA0NTksImV4cCI6MjA5Nzg2NjQ1OX0.V-jSu67jLc0RgGJ5B8oYXluoJMAib3K4PGm4rRuqkFI'
    );

    function showForm() {
      document.getElementById('card').innerHTML = `
        <div class="icon">🔒</div>
        <h1>Redefinir senha</h1>
        <p>Escolha uma nova senha para a sua conta MyCofree.</p>
        <div class="form">
          <label for="password">Nova senha</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
          <label for="confirm">Confirmar senha</label>
          <input type="password" id="confirm" placeholder="Repita a senha" />
          <p class="error" id="error" style="display:none"></p>
          <button id="btn" onclick="resetPassword()">Redefinir senha</button>
        </div>
        <div class="brand">MyCofree · Controle financeiro pessoal</div>
      `;
      setTimeout(() => document.getElementById('password')?.focus(), 100);
    }

    function showInvalidLink() {
      document.getElementById('card').innerHTML = `
        <div class="icon">⚠️</div>
        <h1>Link inválido</h1>
        <p>Este link de recuperação é inválido ou já foi utilizado. Solicite um novo link na aplicação.</p>
        <div class="brand">MyCofree · Controle financeiro pessoal</div>
      `;
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('btn');

      errorEl.style.display = 'none';

      if (password.length < 6) {
        errorEl.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'As senhas não coincidem.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'A redefinir…';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Redefinir senha';
        return;
      }

      document.getElementById('card').innerHTML = `
        <div class="icon">✅</div>
        <h1>Senha redefinida!</h1>
        <p>A sua senha foi alterada com sucesso.</p>
        <p style="margin-top:16px;color:#6c7086;font-size:13px;">Pode fechar esta janela e iniciar sessão com a nova senha.</p>
        <div class="brand">MyCofree · Controle financeiro pessoal</div>
      `;
    }

    // With implicit flow, Supabase redirects with #access_token=...&type=recovery
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const accessToken  = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const type         = hashParams.get('type');

    if (!accessToken || type !== 'recovery') {
      showInvalidLink();
    } else {
      (async () => {
        const { error } = await client.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken ?? '',
        });
        if (error) {
          showInvalidLink();
        } else {
          showForm();
        }
      })();
    }
  </script>
</body>
</html>
